<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flight_model.cfg — MSFS SDK Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;700&display=swap');
  :root {
    --bg:#0a0c0f;--panel:#0f1318;--panel2:#141920;--border:#1e2830;
    --accent:#00d4ff;--accent2:#ff6b2b;--accent3:#39ff7c;
    --text:#c8d8e8;--muted:#4a6070;--section-hdr:#0a1a28;
    --input-bg:#080c10;--hover-row:#111820;--indexed-bg:#0c1520;--expand-bg:#080e14;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;}
  header{background:linear-gradient(180deg,#060a0e 0%,var(--panel) 100%);border-bottom:1px solid var(--accent);padding:14px 28px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 40px #00d4ff18;}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
  .logo span{color:var(--accent2);}
  .file-badge{font-family:'Share Tech Mono',monospace;font-size:12px;background:#001820;border:1px solid var(--accent);color:var(--accent);padding:3px 10px;border-radius:2px;}
  .header-actions{margin-left:auto;display:flex;gap:10px;}
  .btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border:1px solid;cursor:pointer;border-radius:2px;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#000;border-color:var(--accent);}
  .btn-primary:hover{background:#fff;}
  .btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--muted);}
  .btn-import{background:transparent;color:#a0c0d0;border-color:#2a4050;position:relative;overflow:hidden;}
  .btn-import:hover{color:var(--accent);border-color:var(--accent);}
  .btn-import input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

  /* Drop overlay */
  .drop-overlay{display:none;position:fixed;inset:0;background:#000c;z-index:600;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .drop-overlay.active{display:flex;}
  .drop-box{border:2px dashed var(--accent);border-radius:8px;padding:48px 64px;text-align:center;background:#00101a;pointer-events:none;}
  .drop-box-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;color:var(--accent);letter-spacing:3px;margin-bottom:8px;}
  .drop-box-sub{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);}

  .app{display:flex;height:calc(100vh - 55px);}
  .sidebar{width:220px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
  .sidebar-title{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:0 14px 10px;}
  .nav-item{padding:8px 14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);border-left:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px;}
  .nav-item:hover{background:var(--hover-row);color:var(--text);}
  .nav-item.active{color:var(--accent);border-left-color:var(--accent);background:#001a26;}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .search-bar{padding:10px 14px;border-bottom:1px solid var(--border);}
  .search-bar input{width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:5px 10px;border-radius:2px;outline:none;}
  .search-bar input:focus{border-color:var(--accent);}
  .main{flex:1;overflow-y:auto;padding:20px 28px 60px;}
  .section-card{margin-bottom:24px;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .section-header{background:var(--section-hdr);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .section-header:hover{background:#0a1e2e;}
  .section-name{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:1px;}
  .section-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto;}
  .chevron{color:var(--muted);font-size:10px;transition:transform .2s;}
  .chevron.open{transform:rotate(90deg);}
  .section-body{background:var(--panel2);}

  /* Normal KV row */
  .cfg-row{display:grid;grid-template-columns:280px 1fr;border-bottom:1px solid var(--border);position:relative;}
  .cfg-row:last-child{border-bottom:none;}
  .cfg-row:hover{background:var(--hover-row);}
  .key-cell{padding:7px 16px;font-family:'Share Tech Mono',monospace;font-size:12px;color:#7aa8c0;border-right:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:default;position:relative;}
  .info-icon{width:14px;height:14px;border-radius:50%;background:var(--accent);color:#000;font-size:9px;font-family:'Barlow',sans-serif;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s;pointer-events:none;}
  .has-tooltip:hover .info-icon{opacity:1;}
  .val-cell{padding:4px 10px;display:flex;align-items:center;}
  .val-cell input{width:100%;background:transparent;border:1px solid transparent;color:var(--accent3);font-family:'Share Tech Mono',monospace;font-size:12px;padding:3px 7px;border-radius:2px;outline:none;transition:all .15s;}
  .val-cell input:hover{border-color:var(--border);}
  .val-cell input:focus{border-color:var(--accent);background:var(--input-bg);box-shadow:0 0 12px #00d4ff22;}
  .val-cell input.modified{color:var(--accent2);border-color:#ff6b2b44;}
  .val-cell input.long-val{font-size:10px;color:#5a8a6a;}
  .val-cell input.long-val:focus{font-size:11px;color:var(--accent3);}
  .comment-row{padding:5px 16px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);background:#0c1016;border-bottom:1px solid var(--border);font-style:italic;}

  /* Tooltip — only visible on hover, hidden when input focused */
  .tooltip-box{display:none;position:absolute;left:16px;top:calc(100% + 4px);z-index:999;background:#030608;border:1px solid var(--accent);border-radius:4px;padding:10px 14px;width:380px;box-shadow:0 8px 40px #00d4ff30,0 2px 12px #000;pointer-events:none;animation:fadeIn .12s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .has-tooltip:hover .tooltip-box{display:block;}
  .cfg-row:focus-within .tooltip-box{display:none!important;}
  .tt-key{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:6px;}
  .tt-desc{font-family:'Barlow',sans-serif;font-size:12.5px;color:#a0bcc8;line-height:1.55;}
  .tt-unit{margin-top:7px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent2);border-top:1px solid var(--border);padding-top:6px;}

  /* Indexed group */
  .indexed-group{border-bottom:1px solid var(--border);}
  .indexed-group:last-child{border-bottom:none;}
  .indexed-header{display:grid;grid-template-columns:200px 1fr auto;align-items:center;padding:5px 10px 5px 16px;background:#0a1520;min-height:34px;}
  .indexed-key{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);}
  .indexed-raw-val{font-family:'Share Tech Mono',monospace;font-size:10px;color:#3a7a5a;padding:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .indexed-controls{display:flex;gap:5px;flex-shrink:0;}
  .ic-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 8px;border:1px solid;cursor:pointer;border-radius:2px;transition:all .12s;white-space:nowrap;background:transparent;}
  .ic-btn-minus{color:#ff4444;border-color:#552222;}
  .ic-btn-minus:hover{background:#ff4444;color:#000;}
  .ic-btn-plus{color:var(--accent3);border-color:#225522;}
  .ic-btn-plus:hover{background:var(--accent3);color:#000;}
  .ic-btn-edit{color:var(--accent);border-color:#004455;}
  .ic-btn-edit:hover{background:var(--accent);color:#000;}
  .ic-btn-edit.active{background:var(--accent);color:#000;}

  /* Expand panel */
  .expand-panel{background:var(--expand-bg);border-top:1px solid #1a2a3a;padding:10px 16px 14px 32px;display:none;}
  .expand-panel.open{display:block;}
  .expand-field{display:grid;grid-template-columns:260px 1fr;align-items:start;margin-bottom:7px;gap:8px;}
  .expand-label{font-family:'Barlow',sans-serif;font-size:11.5px;color:#7090a0;padding-top:5px;line-height:1.3;}
  .expand-label .pos-hint{font-size:10px;color:#3a6070;display:block;margin-top:2px;line-height:1.4;}
  .expand-input{background:var(--input-bg);border:1px solid var(--border);color:var(--accent3);font-family:'Share Tech Mono',monospace;font-size:12px;padding:4px 8px;border-radius:2px;outline:none;width:100%;transition:all .15s;}
  .expand-input:focus{border-color:var(--accent);box-shadow:0 0 8px #00d4ff22;}
  .expand-input.modified{color:var(--accent2);border-color:#ff6b2b44;}

  /* Confirm dialog */
  .confirm-overlay{display:none;position:fixed;inset:0;background:#000b;z-index:500;align-items:center;justify-content:center;}
  .confirm-overlay.show{display:flex;}
  .confirm-box{background:#0c1520;border:1px solid var(--accent);border-radius:4px;padding:24px 28px;max-width:380px;width:100%;box-shadow:0 20px 60px #000;}
  .confirm-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--accent);margin-bottom:10px;letter-spacing:1px;}
  .confirm-msg{font-size:13px;color:var(--text);margin-bottom:20px;line-height:1.5;}
  .confirm-actions{display:flex;gap:10px;justify-content:flex-end;}

  .statusbar{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid var(--accent);padding:4px 20px;display:flex;gap:20px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);z-index:200;}
  .statusbar span{color:var(--accent);}
  #mod-count{color:var(--accent2);}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--panel);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <div class="logo">projectmax<span>.</span>CFG</div>
  <div class="file-badge" id="file-badge">flight_model.cfg Editor</div>
  <div class="header-actions">
    <button class="btn btn-import" title="Open a .cfg file from your computer">
      ↑ Import .cfg
      <input type="file" accept=".cfg,.txt,text/plain" onchange="handleFileInput(this)">
    </button>
    <button class="btn btn-ghost" onclick="resetAll()">Reset</button>
    <button class="btn btn-primary" onclick="exportCFG()">Export .cfg</button>
  </div>
</header>

<!-- Drag-and-drop overlay -->
<div class="drop-overlay" id="drop-overlay">
  <div class="drop-box">
    <div class="drop-box-title">DROP .CFG HERE</div>
    <div class="drop-box-sub">flight_model.cfg · engines.cfg · any MSFS cfg file</div>
  </div>
</div>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-title">Sections</div>
    <div class="search-bar"><input type="text" placeholder="Search keys…" id="search-input" oninput="filterKeys(this.value)"></div>
    <div id="nav-list"></div>
  </nav>
  <main class="main" id="main-content"></main>
</div>
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">CONFIRM REMOVAL</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="confirmNo()">Cancel</button>
      <button class="btn" style="background:#ff4444;color:#000;border-color:#ff4444" onclick="confirmYes()">Remove</button>
    </div>
  </div>
</div>
<div class="statusbar">
  <span id="mod-count">0</span> modified &nbsp;|&nbsp; hover key for SDK docs &nbsp;|&nbsp; click value to edit
</div>
<script>
const TOOLTIPS={empty_weight:{desc:"Empty weight of the aircraft without fuel, payload or crew.",unit:"pounds"},max_gross_weight:{desc:"Maximum allowable takeoff gross weight. Structural limits are based on this.",unit:"pounds"},reference_datum_position:{desc:"Reference datum for all CG calculations (lon, lat, vert offset from model origin).",unit:"feet"},empty_weight_CG_position:{desc:"CG of the empty aircraft relative to reference datum. +X=forward, +Y=right, +Z=up.",unit:"feet (lon, lat, vert)"},CG_forward_limit:{desc:"Forward CG limit as a fraction of Mean Aerodynamic Chord. CG must stay aft of this.",unit:"fraction of MAC (0–1)"},CG_aft_limit:{desc:"Aft CG limit as a fraction of MAC. Exceeding this makes the aircraft unstable.",unit:"fraction of MAC (0–1)"},empty_weight_pitch_MOI:{desc:"Moment of inertia around the pitch axis for the empty aircraft.",unit:"slug·ft²"},empty_weight_roll_MOI:{desc:"Moment of inertia around the roll axis for the empty aircraft.",unit:"slug·ft²"},empty_weight_yaw_MOI:{desc:"Moment of inertia around the yaw axis for the empty aircraft.",unit:"slug·ft²"},empty_weight_coupled_MOI:{desc:"Cross-product moment of inertia. Represents inertial coupling between axes.",unit:"slug·ft²"},max_number_of_stations:{desc:"Total number of payload/weight stations defined.",unit:"integer"},static_pitch:{desc:"Pitch attitude when stationary on the ground. Only active when physics is off (e.g. hangar).",unit:"degrees (+=up, −=down)"},static_cg_height:{desc:"Height of CG above ground when at rest. Only active when physics is off.",unit:"feet"},gear_system_type:{desc:"Gear actuation type: 0=Electrical, 1=Hydraulic, 2=Pneumatic, 3=Manual, 4=None.",unit:"enum (0–4)"},tailwheel_lock:{desc:"Whether a tailwheel lock is available (1=YES / 0=NO).",unit:"boolean"},max_number_of_points:{desc:"Total contact point count. The sim expects exactly this many point.N entries (0 to N−1).",unit:"integer"},gear_locked_on_ground:{desc:"If 1, gear handle locks DOWN whenever ai lean"},wing_sweep:{desc:"Leading-edge sweep angle. Positive sweep helps high-speed performance.",unit:"degrees"},wing_pos_apex_lon:{desc:"Longitudinal position of the wing leading-edge apex.",unit:"feet"},wing_pos_apex_vert:{desc:"Vertical position of the wing leading-edge apex.",unit:"feet"},htail_area:{desc:"Total horizontal tail planform area (stabilizer + elevator).",unit:"square feet"},htail_span:{desc:"Horizontal tail tip-to-tip span.",unit:"feet"},htail_pos_lon:{desc:"Longitudinal position of the horizontal tail reference point.",unit:"feet"},htail_pos_vert:{desc:"Vertical position of the horizontal tail reference point.",unit:"feet"},htail_incidence:{desc:"Horizontal stabilizer incidence angle for neutral pitch trim.",unit:"degrees"},htail_sweep:{desc:"Leading-edge sweep of the horizontal tail.",unit:"degrees"},htail_thickness_ratio:{desc:"Thickness-to-chord ratio of the horizontal tail.",unit:"fraction"},vtail_area:{desc:"Total vertical tail planform area (fin + rudder).",unit:"square feet"},vtail_pos_lon:{desc:"Longitudinal position of the vertical tail reference point.",unit:"feet"},vtail_pos_vert:{desc:"Vertical position of the vertical tail reference point.",unit:"feet"},vtail_span:{desc:"Height of the vertical tail.",unit:"feet"},vtail_sweep:{desc:"Leading-edge sweep of the vertical tail.",unit:"degrees"},vtail_thickness_ratio:{desc:"Thickness-to-chord ratio of the vertical tail.",unit:"fraction"},fuselage_length:{desc:"Total fuselage length nose to tail.",unit:"feet"},fuselage_diameter:{desc:"Maximum fuselage cross-section diameter.",unit:"feet"},fuselage_center_pos:{desc:"Position of the fuselage aerodynamic center (lon, lat, vert).",unit:"feet"},elevator_area:{desc:"Total moving elevator surface area.",unit:"square feet"},aileron_area:{desc:"Total aileron surface area (both wings).",unit:"square feet"},rudder_area:{desc:"Total rudder surface area.",unit:"square feet"},elevator_up_limit:{desc:"Maximum upward elevator deflection.",unit:"degrees"},elevator_down_limit:{desc:"Maximum downward elevator deflection.",unit:"degrees"},aileron_up_limit:{desc:"Maximum upward aileron deflection (one side).",unit:"degrees"},aileron_down_limit:{desc:"Maximum downward aileron deflection (one side).",unit:"degrees"},rudder_limit:{desc:"Maximum rudder deflection either direction.",unit:"degrees"},rudder_trim_limit:{desc:"Maximum rudder trim deflection.",unit:"degrees"},elevator_trim_limit:{desc:"Maximum elevator trim deflection.",unit:"degrees"},elevator_trim_neutral:{desc:"Neutral position of the elevator trim.",unit:"degrees"},spoiler_limit:{desc:"Maximum spoiler/speedbrake deflection.",unit:"degrees"},spoilerons_available:{desc:"Set to 1 if spoilers can act as asymmetric roll control (spoilerons).",unit:"boolean"},spoiler_handle_available:{desc:"Whether a dedicated speedbrake handle exists in the cockpit.",unit:"boolean"},auto_spoiler_available:{desc:"Whether automatic ground spoilers deploy on landing.",unit:"boolean"},positive_g_limit_flaps_up:{desc:"Maximum positive load factor, flaps retracted.",unit:"G"},positive_g_limit_flaps_down:{desc:"Maximum positive load factor, flaps extended.",unit:"G"},negative_g_limit_flaps_up:{desc:"Maximum negative load factor, flaps retracted.",unit:"G"},negative_g_limit_flaps_down:{desc:"Maximum negative load factor, flaps extended.",unit:"G"},load_safety_factor:{desc:"Safety factor on structural load limits before damage.",unit:"multiplier"},fly_by_wire:{desc:"Enables fly-by-wire envelope protection.",unit:"boolean"},aileron_span_outboard:{desc:"Outboard spanwise position of aileron as fraction of half-span.",unit:"fraction (0–1)"},controls_reactivity_scalar:{desc:"Global scalar on control surface responsiveness.",unit:"multiplier"},lift_coef_pitch_rate:{desc:"Lift coefficient due to pitch rate (CLq). Lift lag as wing pitches.",unit:"per rad/s"},lift_coef_at_drag_zero:{desc:"Lift coefficient at zero drag. Baseline lift at design cruise.",unit:"dimensionless"},lift_coef_flaps:{desc:"Lift c // ── State ──
let parsedSections=[];
let confirmCB=null;

function getBase(key){const m=key.match(/^(.+?)\.(\d+)$/i);return m?m[1].toLowerCase():null;}

function parseCFG(text){
  const secs=[];let cur=null;
  for(const raw of text.split('\n')){
    const line=raw.trim();if(!line)continue;
    const sm=line.match(/^\[(.+?)\]$/);
    if(sm){cur={name:sm[1],entries:[]};secs.push(cur);continue;}
    if(!cur)continue;
    if(line.startsWith(';')){cur.entries.push({type:'comment',text:line});continue;}
    const ei=line.indexOf('=');if(ei===-1)continue;
    const key=line.substring(0,ei).trim();
    let rest=line.substring(ei+1);let comment='';
    const si=rest.indexOf(';');
    if(si!==-1){comment=rest.substring(si+1).trim();rest=rest.substring(0,si).trim();}else rest=rest.trim();
    cur.entries.push({type:'kv',key,value:rest,comment,originalValue:rest});
  }
  return secs;
}

function buildUI(sections){
  const nav=document.getElementById('nav-list');
  const main=document.getElementById('main-content');
  nav.innerHTML='';main.innerHTML='';
  sections.forEach((sec,si)=>{
    const ni=document.createElement('div');
    ni.className='nav-item';ni.dataset.section=sec.name;
    ni.innerHTML=`<span class="nav-dot"></span>${sec.name}`;
    ni.onclick=()=>{document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));ni.classList.add('active');document.getElementById('sec-'+si).scrollIntoView({behavior:'smooth',block:'start'});};
    nav.appendChild(ni);
    const card=document.createElement('div');card.className='section-card';card.id='sec-'+si;
    const kvCount=sec.entries.filter(e=>e.type==='kv').length;
    const hdr=document.createElement('div');hdr.className='section-header';
    hdr.innerHTML=`<span class="chevron open">▶</span><span class="section-name">[${sec.name}]</span><span class="section-count">${kvCount} params</span>`;
    hdr.onclick=()=>{const b=card.querySelector('.section-body');const ch=hdr.querySelector('.chevron');const hidden=b.style.display==='none';b.style.display=hidden?'':'none';ch.classList.toggle('open',hidden);};
    card.appendChild(hdr);
    const body=document.createElement('div');body.className='section-body';
    renderBody(body,sec,si);
    card.appendChild(body);main.appendChild(card);
  });
  nav.querySelector('.nav-item')?.classList.add('active');
  setupIO();
}

function renderBody(body,sec,si){
  body.innerHTML='';
  let i=0;
  while(i<sec.entries.length){
    const e=sec.entries[i];
    if(e.type==='comment'){const r=document.createElement('div');r.className='comment-row';r.textContent=e.text;body.appendChild(r);i++;continue;}
    const base=getBase(e.key);
    if(base){
      // collect consecutive same-base entries
      const grp=[];let j=i;
      while(j<sec.entries.length){const e2=sec.entries[j];if(e2.type==='kv'&&getBase(e2.key)===base){grp.push({entry:e2,idx:j});j++;}else break;}
      renderIndexedGroup(body,base,grp,sec,si);
      i=j;
    }else{renderKVRow(body,e,sec,si);i++;}
  }
}

function renderKVRow(body,entry,sec,si){
  const row=document.createElement('div');row.className='cfg-row';row.dataset.key=entry.key;
  const tt=TOOLTIPS[entry.key]||TOOLTIPS[entry.key.toLowerCase()];
  if(tt)row.classList.add('has-tooltip');
  const kc=document.createElement('div');kc.className='key-cell';
  kc.innerHTML=`<span class="info-icon">i</span>${entry.key}`;
  const vc=document.createElement('div');vc.className='val-cell';
  const inp=document.createElement('input');inp.type='text';inp.value=entry.value;
  if(entry.value.length>40)inp.classList.add('long-val');
  inp.oninput=ev=>{entry.value=ev.target.value;ev.target.classList.toggle('modified',ev.target.value!==entry.originalValue);updateModCount();};
  vc.appendChild(inp);
  if(tt){const tb=document.createElement('div');tb.className='tooltip-box';tb.innerHTML=`<div class="tt-key">${entry.key}</div><div class="tt-desc">${tt.desc}</div>${tt.unit?`<div class="tt-unit">Unit: ${tt.unit}</div>`:''}`;kc.appendChild(tb);}
  row.appendChild(kc);row.appendChild(vc);body.appendChild(row);
}

function renderIndexedGroup(body,base,grp,sec,si){
  const schema=SCHEMAS[base]||null;
  grp.forEach(({entry})=>{
    const wrap=document.createElement('div');wrap.className='indexed-group';wrap.dataset.base=base;
    const hdr=document.createElement('div');hdr.className='indexed-header';
    const keySpan=document.createElement('div');keySpan.className='indexed-key';keySpan.textContent=entry.key;
    const rawEl=document.createElement('div');rawEl.className='indexed-raw-val';rawEl.textContent=entry.value;
    const ctrls=document.createElement('div');ctrls.className='indexed-controls';
    const bm=document.createElement('button');bm.className='ic-btn ic-btn-minus';bm.textContent='−';bm.title='Remove';
    bm.onclick=()=>askRemove(entry.key,sec,si);
    const bp=document.createElement('button');bp.className='ic-btn ic-btn-plus';bp.textContent='+';bp.title='Duplicate below';
    bp.onclick=()=>dupEntry(entry,sec,si);
    ctrls.appendChild(bm);ctrls.appendChild(bp);
    if(schema){
      const be=document.createElement('button');be.className='ic-btn ic-btn-edit';be.textContent='Edit per value';
      be.onclick=()=>{const p=wrap.querySelector('.expand-panel');const open=p.classList.toggle('open');be.classList.toggle('active',open);};
      ctrls.appendChild(be);
    }
    hdr.appendChild(keySpan);hdr.appendChild(rawEl);hdr.appendChild(ctrls);
    wrap.appendChild(hdr);
    if(schema){
      const panel=document.createElement('div');panel.className='expand-panel';
      buildExpandPanel(panel,entry,schema,rawEl);
      wrap.appendChild(panel);
    }
    body.appendChild(wrap);
  });
}

function buildExpandPanel(panel,entry,schema,rawEl){
  panel.innerHTML='';
  // Split carefully — commas inside values (like TT:Row 1 (max. 3)) are fine since they're the 5th field
  const parts=entry.value.split(',');
  const live=[...parts];
  const maxFields=Math.max(schema.length,parts.length);
  for(let idx=0;idx<maxFields;idx++){
    const field=schema[idx]||{label:`Param ${idx+1}`,hint:`Value at position [${idx}].`};
    const row=document.createElement('div');row.className='expand-field';
    const lbl=document.createElement('div');lbl.className='expand-label';
    lbl.innerHTML=`${field.label}<span class="pos-hint">[${idx}] ${field.hint}</span>`;
    const inp=document.createElement('input');inp.className='expand-input';inp.type='text';
    inp.value=live[idx]!==undefined?live[idx].trim():'';
    inp.oninput=()=>{
      live[idx]=inp.value;
      const newVal=live.join(',');
      entry.value=newVal;
      rawEl.textContent=newVal;
      inp.classList.toggle('modified',newVal!==entry.originalValue);
      updateModCount();
    };
    row.appendChild(lbl);row.appendChild(inp);panel.appendChild(row);
  }
}

function dupEntry(entry,sec,si){
  const base=getBase(entry.key);if(!base)return;
  const baseEntries=sec.entries.filter(e=>e.type==='kv'&&getBase(e.key)===base);
  const nextIdx=baseEntries.length;
  let lastPos=-1;
  for(let i=sec.entries.length-1;i>=0;i--){if(sec.entries[i].type==='kv'&&getBase(sec.entries[i].key)===base){lastPos=i;break;}}
  const newEntry={type:'kv',key:`${base}.${nextIdx}`,value:entry.value,comment:entry.comment,originalValue:''};
  sec.entries.splice(lastPos+1,0,newEntry);
  rebuildSection(si);updateModCount();
}

function askRemove(keyName,sec,si){
  document.getElementById('confirm-msg').textContent=`Remove "${keyName}" and renumber the remaining entries?`;
  document.getElementById('confirm-overlay').classList.add('show');
  confirmCB=()=>doRemove(keyName,sec,si);
}
function doRemove(keyName,sec,si){
  const base=getBase(keyName);
  const idx=sec.entries.findIndex(e=>e.type==='kv'&&e.key===keyName);
  if(idx===-1)return;
  sec.entries.splice(idx,1);
  let n=0;
  for(const e of sec.entries){if(e.type==='kv'&&getBase(e.key)===base){e.key=`${base}.${n}`;n++;}}
  rebuildSection(si);updateModCount();
}
function confirmYes(){document.getElementById('confirm-overlay').classList.remove('show');if(confirmCB){confirmCB();confirmCB=null;}}
function confirmNo(){document.getElementById('confirm-overlay').classList.remove('show');confirmCB=null;}

function rebuildSection(si){
  const sec=parsedSections[si];
  const body=document.getElementById('sec-'+si).querySelector('.section-body');
  renderBody(body,sec,si);
}

function updateModCount(){
  let c=0;
  for(const sec of parsedSections)for(const e of sec.entries)if(e.type==='kv'&&e.value!==e.originalValue)c++;
  document.getElementById('mod-count').textContent=c;
}

function resetAll(){
  for(const sec of parsedSections)for(const e of sec.entries)if(e.type==='kv')e.value=e.originalValue;
  buildUI(parsedSections);
}

function exportCFG(){
  let out='';
  for(const sec of parsedSections){
    out+=`[${sec.name}]\n`;
    for(const e of sec.entries){
      if(e.type==='comment')out+=e.text+'\n';
      else out+=`${e.key}=${e.value}${e.comment?' ; '+e.comment:''}\n`;
    }
    out+='\n';
  }
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'text/plain'}));a.download='flight_model.cfg';a.click();
}

function filterKeys(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.cfg-row,.indexed-group').forEach(r=>{
    if(!q){r.style.display='';return;}
    r.style.display=(r.dataset.key||r.dataset.base||'').toLowerCase().includes(q)?'':'none';
  });
}

function setupIO(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        const si=parseInt(en.target.id.replace('sec-',''));
        const sec=parsedSections[si];
        if(sec)document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.section===sec.name));
      }
    });
  },{threshold:0.1});
  document.querySelectorAll('.section-card').forEach(c=>obs.observe(c));
}

parsedSections=parseCFG(RAW_CFG);
buildUI(parsedSections);

// ── File import ──────────────────────────────────────
function handleFileInput(input){
  const file=input.files[0];
  if(!file)return;
  readCFGFile(file);
  input.value=''; // reset so same file can be re-imported
}

function readCFGFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    loadCFGText(text,file.name);
  };
  reader.readAsText(file);
}

function loadCFGText(text,filename){
  parsedSections=parseCFG(text);
  buildUI(parsedSections);
  document.getElementById('file-badge').textContent=filename||'imported.cfg';
  document.getElementById('mod-count').textContent='0';
}

// ── Drag and drop ────────────────────────────────────
const overlay=document.getElementById('drop-overlay');
let dragCounter=0;

document.addEventListener('dragenter',e=>{
  if(e.dataTransfer.types.includes('Files')){
    dragCounter++;
    overlay.classList.add('active');
    e.preventDefault();
  }
});
document.addEventListener('dragleave',e=>{
  dragCounter--;
  if(dragCounter<=0){dragCounter=0;overlay.classList.remove('active');}
});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  dragCounter=0;
  overlay.classList.remove('active');
  const file=e.dataTransfer.files[0];
  if(file)readCFGFile(file);
});
</script>
